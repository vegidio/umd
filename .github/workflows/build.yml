name: build

on:
  push:
    tags:
      - '*'

permissions: {}

env:
  BINARY_NAME: umd
  GO_VERSION: '1.25'
  WAILS_VERSION: 'v2.12.0'
  PNPM_VERSION: '10'

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            artifact: binaries-linux-amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            artifact: binaries-linux-arm64
    runs-on: ${{ matrix.runner }}
    env:
      OTEL_ENDPOINT: ${{ secrets.OTEL_ENDPOINT }}
      OTEL_HEADER_AUTH: ${{ secrets.OTEL_HEADER_AUTH }}
      VITE_MUI_LICENSE: ${{ secrets.VITE_MUI_LICENSE }}
    steps:
      - name: Code checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev
          pnpm install -g @go-task/cli

      - name: Build Linux binaries
        run: |
          node scripts/replace.mjs shared/constants.go "<version>=>${{ github.ref_name }}"
          node scripts/replace.mjs shared/constants.go "<otel_endpoint>=>$OTEL_ENDPOINT"
          node scripts/replace.mjs shared/constants.go "<otel_auth>=>$OTEL_HEADER_AUTH"
          node scripts/replace.mjs shared/constants.go "EnvDevelopment=>EnvProduction"
          task package oses=linux archs=${{ matrix.arch }}

      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/*.zip

  build-macos:
    runs-on: macos-latest
    env:
      OTEL_ENDPOINT: ${{ secrets.OTEL_ENDPOINT }}
      OTEL_HEADER_AUTH: ${{ secrets.OTEL_HEADER_AUTH }}
      VITE_MUI_LICENSE: ${{ secrets.VITE_MUI_LICENSE }}
    steps:
      - name: Code checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
          pnpm install -g @go-task/cli

      - name: Build MacOS binaries
        run: |
          node scripts/replace.mjs shared/constants.go "<version>=>${{ github.ref_name }}"
          node scripts/replace.mjs shared/constants.go "<otel_endpoint>=>$OTEL_ENDPOINT"
          node scripts/replace.mjs shared/constants.go "<otel_auth>=>$OTEL_HEADER_AUTH"
          node scripts/replace.mjs shared/constants.go "EnvDevelopment=>EnvProduction"
          task package oses=darwin archs='amd64 arm64'

      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-macos
          path: build/*.zip

  build-windows-amd64:
    runs-on: windows-latest
    env:
      OTEL_ENDPOINT: ${{ secrets.OTEL_ENDPOINT }}
      OTEL_HEADER_AUTH: ${{ secrets.OTEL_HEADER_AUTH }}
      VITE_MUI_LICENSE: ${{ secrets.VITE_MUI_LICENSE }}
    steps:
      - name: Code checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install dependencies
        run: |
          pnpm install -g @go-task/cli

      - name: Build Windows binaries
        run: |
          node scripts/replace.mjs shared/constants.go "<version>=>${{ github.ref_name }}"
          node scripts/replace.mjs shared/constants.go "<otel_endpoint>=>$OTEL_ENDPOINT"
          node scripts/replace.mjs shared/constants.go "<otel_auth>=>$OTEL_HEADER_AUTH"
          node scripts/replace.mjs shared/constants.go "EnvDevelopment=>EnvProduction"
          task package oses=windows archs=amd64

      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-windows-amd64
          path: build/*.zip

  build-windows-arm64:
    runs-on: windows-11-arm
    env:
      OTEL_ENDPOINT: ${{ secrets.OTEL_ENDPOINT }}
      OTEL_HEADER_AUTH: ${{ secrets.OTEL_HEADER_AUTH }}
      VITE_MUI_LICENSE: ${{ secrets.VITE_MUI_LICENSE }}
    steps:
      - name: Code checkout
        uses: actions/checkout@v5

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install: |
            mingw-w64-clang-aarch64-gcc-compat

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install dependencies
        run: |
          pnpm install -g @go-task/cli

      - name: Build Windows binaries
        shell: msys2 {0}
        env:
          MSYS2_PATH_TYPE: inherit
          MSYSTEM: CLANGARM64
          CC: aarch64-w64-mingw32-gcc
          CXX: aarch64-w64-mingw32-g++
        run: |
          node scripts/replace.mjs shared/constants.go "<version>=>${{ github.ref_name }}"
          node scripts/replace.mjs shared/constants.go "<otel_endpoint>=>$OTEL_ENDPOINT"
          node scripts/replace.mjs shared/constants.go "<otel_auth>=>$OTEL_HEADER_AUTH"
          node scripts/replace.mjs shared/constants.go "EnvDevelopment=>EnvProduction"
          task package oses=windows archs=arm64

      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-windows-arm64
          path: build/*.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows-amd64, build-windows-arm64]
    permissions:
      contents: write
    steps:
      # The `fetch-depth: 0` is important to fetch all the tags
      - name: Code checkout
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch artifact
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Create the changelog
        run: |
          pnpm install -g release-it@19.2.4 @release-it/conventional-changelog@10.0.1
          release-it --ci

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          name: ${{ github.ref_name }}
          tag: ${{ github.ref_name }}
          bodyFile: CHANGELOG.md
          replacesArtifacts: true
          artifacts: binaries/*.zip