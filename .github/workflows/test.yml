name: test

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Tests require external resources (cookies/auth) that are not yet configured for CI
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v5

      - name: Get cookies
        run: echo "$COOKIES" > tests/cookies.txt
        env:
          COOKIES: ${{ secrets.VITE_MUI_LICENSE }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run tests
        run: go test -v ./tests/...
